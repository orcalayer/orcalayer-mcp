name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install pytest pytest-asyncio

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest tests/ -v
          else
            echo "No tests directory found — checking import only"
            python -c "import orcalayer_mcp; print('Import OK')"
          fi

      - name: Verify MCP tools list
        run: |
          python - <<'PY' || echo 'Tool list check needs manual verification'
          import asyncio
          from orcalayer_mcp import mcp

          async def check():
              tools = await mcp.list_tools()
              print(f"Found {len(tools)} tools")
              assert len(tools) >= 5, "Expected at least 5 tools"

          asyncio.run(check())
          PY

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check src/ || true
